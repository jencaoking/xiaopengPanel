[pytest]
# 测试目录
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 严格标记
strict_markers = true

# 默认选项
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=modules
    --cov=api
    --cov=config
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70

# 自定义标记
markers =
    unit: 单元测试（快速，无外部依赖）
    integration: 集成测试（测试API端点，使用Flask测试客户端）
    security: 安全测试（聚焦安全相关功能）
    slow: 慢速测试（执行时间较长）
    e2e: 端到端测试（完整用户流程）

# 日志配置
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
